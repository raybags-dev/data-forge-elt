name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + tests ────────────────────────────────────────────────────
  test:
    name: Tests (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium
        continue-on-error: true  # tests mock playwright; don't block on download failures

      - name: Ruff lint
        run: uv run ruff check . --output-format github

      - name: Pytest
        env:
          APP_NAME: DataForge-CI
          SECRET_KEY: ci-secret-key-0000000000000000000000000000000000
          DATA_LAKE: /tmp/ci-datalake
          DUCKDB_PATH: /tmp/ci.duckdb
          LOG_DIR: /tmp/ci-logs
        run: uv run pytest tests/ -q --tb=short --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── dbt: deps + parse ───────────────────────────────────────────────────────
  dbt-validate:
    name: dbt parse & deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync

      - name: Cache dbt packages
        uses: actions/cache@v4
        with:
          path: dbt/dbt_packages
          key: dbt-packages-${{ hashFiles('dbt/packages.yml') }}
          restore-keys: dbt-packages-

      - name: dbt deps
        env:
          DUCKDB_PATH: /tmp/ci-dbt.duckdb
        run: uv run dbt deps --project-dir dbt --profiles-dir dbt

      - name: dbt parse (syntax check)
        env:
          DUCKDB_PATH: /tmp/ci-dbt.duckdb
        run: uv run dbt parse --project-dir dbt --profiles-dir dbt --no-partial-parse

  # ── React UI: build ─────────────────────────────────────────────────────────
  ui-build:
    name: React UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        working-directory: app/ui
        run: npm install

      - name: Build
        working-directory: app/ui
        env:
          VITE_API_BASE_URL: http://localhost:8002
        run: npm run build

  # ── Docker: verify images build ─────────────────────────────────────────────
  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t dataforge-api:ci -f docker/Dockerfile.api .

      - name: Build Streamlit image
        run: docker build -t dataforge-streamlit:ci -f docker/Dockerfile.streamlit .

      - name: Build UI image
        run: docker build -t dataforge-ui:ci -f docker/Dockerfile.ui .
