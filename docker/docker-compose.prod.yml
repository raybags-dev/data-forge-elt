# DataForge ELT — production (Hetzner VPS 89.167.74.127)
# Ports: API=8002  Streamlit=8501  UI=8503
# Data volumes: /mnt/portfolio-data/dataforge/
#
# Used by scripts/prod-deploy.sh — do not run manually without the env file.

services:
  api:
    image: ghcr.io/${GHCR_OWNER:-raybags-dev}/dataforge-api:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "8002:8002"
    volumes:
      - /mnt/portfolio-data/dataforge/datalake:/app/datalake
      - /mnt/portfolio-data/dataforge/warehouse:/app/warehouse
      - /mnt/portfolio-data/dataforge/logs:/app/logs
      - /mnt/portfolio-data/dataforge/dbt-target:/app/dbt/target
      - /mnt/portfolio-data/playwright:/app/.playwright
    env_file: .env.prod
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    shm_size: 256mb
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048m
    networks: [dataforge]

  streamlit:
    image: ghcr.io/${GHCR_OWNER:-raybags-dev}/dataforge-streamlit:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - /mnt/portfolio-data/dataforge/datalake:/app/datalake
      - /mnt/portfolio-data/dataforge/warehouse:/app/warehouse
      - /mnt/portfolio-data/dataforge/logs:/app/logs
    env_file: .env.prod
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks: [dataforge]

  ui:
    image: ghcr.io/${GHCR_OWNER:-raybags-dev}/dataforge-ui:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "8503:8503"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    networks: [dataforge]

networks:
  dataforge:
    driver: bridge
